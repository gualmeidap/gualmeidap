name: GitHub Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:

jobs:
  gerar-metricas:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. Stats (Lines of Code) - Auto-commit via API com Depuração
      - name: Gerar Stats (Lines of Code)
        uses: lowlighter/metrics@latest
        with:
          filename: stats.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_lines: yes
          config_theme: github-dark
          plugins_errors_fatal: yes
          debug: yes

      # 2. Langs (Ignorando front-end) - Auto-commit via API com Erro Fatal Ativo
      - name: Gerar Langs
        uses: lowlighter/metrics@latest
        with:
          filename: langs.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.METRICS_TOKEN }}
          base: "" 
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: percentage
          config_theme: github-dark
          plugins_errors_fatal: yes
          
      # 3. Activity Graph (Calendário Isométrico local) - Auto-commit via API com Erro Fatal Ativo
      - name: Gerar Activity Graph
        uses: lowlighter/metrics@latest
        with:
          filename: activity.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_theme: github-dark
          plugins_errors_fatal: yes

      # 4. Checkout do repositório (Agora com os SVGs atualizados inclusos)
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          ref: main

      # 5. Streak
      - name: Gerar Streak
        uses: DenverCoder1/github-readme-streak-stats@v1.7.0
        with:
          github_user: gualmeidap
          github_token: ${{ secrets.METRICS_TOKEN }}
          path: streak.svg
          options: theme=dark

      # 6. Salvar Streak no repositório
      - name: Salvar Streak no repositório
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Atualiza as métricas (Streak)"
          file_pattern: "streak.svg"
