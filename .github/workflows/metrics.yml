name: GitHub Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:

jobs:
  gerar-metricas:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. Langs (Ignorando front-end) - Auto-commit via API
      - name: Gerar Langs
        uses: lowlighter/metrics@latest
        with:
          filename: langs.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.METRICS_TOKEN }}
          base: "" 
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: percentage
          config_theme: github-dark
          
      # 2. Activity Graph (Calendário Isométrico local) - Auto-commit via API
      - name: Gerar Activity Graph
        uses: lowlighter/metrics@latest
        with:
          filename: activity.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_theme: github-dark

      # 3. Checkout do repositório (Agora com os SVGs atualizados inclusos)
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          ref: main

      # 4. GitHub Readme Stats (Substituindo o stats do lowlighter)
      - name: Gerar GitHub Readme Stats
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=gualmeidap&show_icons=true&theme=tokyonight&count_private=true
          path: stats.svg
          token: ${{ secrets.METRICS_TOKEN }} # PAT que lê repositórios privados

      # 5. Streak
      - name: Gerar Streak
        uses: DenverCoder1/github-readme-streak-stats@v1.7.0
        with:
          github_user: gualmeidap
          github_token: ${{ secrets.METRICS_TOKEN }}
          path: streak.svg
          options: theme=dark

      # 6. Salvar Streak e Stats no repositório
      - name: Salvar métricas no repositório
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Atualiza as métricas (Streak e Stats)"
          file_pattern: "streak.svg stats.svg"
