name: GitHub Metrics
on:
  # Atualiza as métricas automaticamente todos os dias à meia-noite
  schedule: [{cron: "0 0 * * *"}]
  # Permite que você force a atualização manualmente
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Usa o secret que você já configurou para ler os repositórios privados
          token: ${{ secrets.METRICS_TOKEN }}
          config_timezone: America/Sao_Paulo
          
          # Estatísticas gerais (Stats)
          base: header, activity, community, repositories, metadata
          
          # Linguagens (Langs)
          plugin_languages: yes
          plugin_languages_ignored: html, css # Oculta o front-end para manter as métricas focadas estritamente no back-end
          plugin_languages_details: percentage
          
          # Calendário de contribuições e sequência (Streak)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
