name: Generate GitHub Metrics
on:
  schedule:
    - cron: '0 * * * *' # Roda a cada hora
  workflow_dispatch:
jobs:
  update-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Download SVGs
        run: |
          # Baixa os arquivos e salva localmente
          curl -s "https://github-readme-stats.vercel.app/api?username=gualmeidap&show_icons=true&theme=github_dark_dimmed&include_all_commits=true&count_private=true&hide_border=true" > stats.svg
          curl -s "https://github-readme-stats.vercel.app/api/top-langs/?username=gualmeidap&layout=compact&theme=github_dark_dimmed&hide_border=true&langs_count=8" > langs.svg
          curl -s "https://github-readme-streak-stats.herokuapp.com/?user=gualmeidap&theme=github-dark-blue&hide_border=true" > streak.svg
      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stats.svg langs.svg streak.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update metrics SVGs" && git push)